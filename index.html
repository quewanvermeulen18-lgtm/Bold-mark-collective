

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Mark Collective | Where Bold Brands Are Born</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #080808;
            --deep: #111111;
            --surface: #161616;
            --card: #1c1c1c;
            --border: #252525;
            --border-soft: #2a2a2a;
            --gold: #c9a962;
            --gold-light: #e2c97e;
            --gold-pale: #f0e0b0;
            --gold-dim: rgba(201,169,98,0.15);
            --text: #f0f0f0;
            --text-muted: #888;
            --text-dim: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--text);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--gold); }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 5%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8,8,8,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            transition: height 0.3s ease, background 0.3s ease;
        }

        nav.scrolled {
            height: 64px;
            background: rgba(8,8,8,0.97);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .nav-logo img {
            height: 46px;
            width: 46px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(201,169,98,0.3));
            transition: filter 0.3s ease;
        }

        .nav-logo:hover img {
            filter: drop-shadow(0 0 14px rgba(201,169,98,0.6));
        }

        .nav-logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .nav-logo-text .name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .nav-logo-text .name span { color: var(--gold); }

        .nav-logo-text .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--gold); }
        .nav-links a:hover::after { width: 100%; }

        .nav-cta {
            padding: 0.65rem 1.8rem;
            background: transparent;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: var(--gold);
            color: var(--black);
        }

        /* ── HERO ── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 80px 5% 0;
        }

        .hero-ambient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 15% 50%, rgba(201,169,98,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 85% 75%, rgba(201,169,98,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Subtle grain texture overlay */
        .hero-ambient::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        /* Ornamental horizontal rule */
        .hero-rule {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            justify-content: center;
        }

        .hero-rule-line {
            height: 1px;
            width: 60px;
            background: linear-gradient(to right, transparent, var(--gold));
        }

        .hero-rule-line.right {
            background: linear-gradient(to left, transparent, var(--gold));
        }

        .hero-rule-diamond {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .hero-content {
            text-align: center;
            z-index: 1;
            max-width: 860px;
        }

        .hero-logo-mark {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin: 0 auto 2.5rem;
            display: block;
            filter: drop-shadow(0 0 30px rgba(201,169,98,0.25));
            animation: heroLogoIn 1.2s ease-out both;
        }

        .hero-eyebrow {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            display: block;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.2rem, 7vw, 6rem);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            animation: fadeUp 1s ease-out 0.35s both;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-style: italic;
            color: var(--text-muted);
            margin: 1.5rem 0 3rem;
            letter-spacing: 1px;
            animation: fadeUp 1s ease-out 0.5s both;
        }

        .hero-actions {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 1s ease-out 0.65s both;
        }

        .btn-primary {
            padding: 1rem 2.8rem;
            background: var(--gold);
            color: var(--black);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--gold);
        }

        .btn-ghost {
            padding: 1rem 2.8rem;
            background: transparent;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border: 1px solid var(--border-soft);
            transition: all 0.3s ease;
        }

        .btn-ghost:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: fadeUp 1s ease-out 1s both;
        }

        .scroll-cue span {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .scroll-cue-line {
            width: 1px;
            height: 50px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

            padding: 0.9...
