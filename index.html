<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Mark Collective | Where Bold Brands Are Born</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #080808;
            --deep: #111111;
            --surface: #161616;
            --card: #1c1c1c;
            --border: #252525;
            --border-soft: #2a2a2a;
            --gold: #c9a962;
            --gold-light: #e2c97e;
            --gold-pale: #f0e0b0;
            --gold-dim: rgba(201,169,98,0.15);
            --text: #f0f0f0;
            --text-muted: #888;
            --text-dim: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--text);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--gold); }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 5%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8,8,8,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            transition: height 0.3s ease, background 0.3s ease;
        }

        nav.scrolled {
            height: 64px;
            background: rgba(8,8,8,0.97);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .nav-logo img {
            height: 46px;
            width: 46px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(201,169,98,0.3));
            transition: filter 0.3s ease;
        }

        .nav-logo:hover img {
            filter: drop-shadow(0 0 14px rgba(201,169,98,0.6));
        }

        .nav-logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .nav-logo-text .name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .nav-logo-text .name span { color: var(--gold); }

        .nav-logo-text .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--gold); }
        .nav-links a:hover::after { width: 100%; }

        .nav-cta {
            padding: 0.65rem 1.8rem;
            background: transparent;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: var(--gold);
            color: var(--black);
        }

        /* ── HERO ── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 80px 5% 0;
        }

        .hero-ambient {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 15% 50%, rgba(201,169,98,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 85% 75%, rgba(201,169,98,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Subtle grain texture overlay */
        .hero-ambient::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        /* Ornamental horizontal rule */
        .hero-rule {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            justify-content: center;
        }

        .hero-rule-line {
            height: 1px;
            width: 60px;
            background: linear-gradient(to right, transparent, var(--gold));
        }

        .hero-rule-line.right {
            background: linear-gradient(to left, transparent, var(--gold));
        }

        .hero-rule-diamond {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .hero-content {
            text-align: center;
            z-index: 1;
            max-width: 860px;
        }

        .hero-logo-mark {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin: 0 auto 2.5rem;
            display: block;
            filter: drop-shadow(0 0 30px rgba(201,169,98,0.25));
            animation: heroLogoIn 1.2s ease-out both;
        }

        .hero-eyebrow {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            display: block;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.2rem, 7vw, 6rem);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            animation: fadeUp 1s ease-out 0.35s both;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-style: italic;
            color: var(--text-muted);
            margin: 1.5rem 0 3rem;
            letter-spacing: 1px;
            animation: fadeUp 1s ease-out 0.5s both;
        }

        .hero-actions {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 1s ease-out 0.65s both;
        }

        .btn-primary {
            padding: 1rem 2.8rem;
            background: var(--gold);
            color: var(--black);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--gold);
        }

        .btn-ghost {
            padding: 1rem 2.8rem;
            background: transparent;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border: 1px solid var(--border-soft);
            transition: all 0.3s ease;
        }

        .btn-ghost:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: fadeUp 1s ease-out 1s both;
        }

        .scroll-cue span {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .scroll-cue-line {
            width: 1px;
            height: 50px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        /* ── MARQUEE STRIP ── */
        .marquee-strip {
            background: var(--gold);
            padding: 0.9rem 0;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee-inner {
            display: inline-flex;
            animation: marquee 25s linear infinite;
        }

        .marquee-item {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-style: italic;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--black);
            padding: 0 2.5rem;
        }

        .marquee-dot {
            color: rgba(0,0,0,0.4);
            padding: 0 0.5rem;
        }

        /* ── SERVICES ── */
        .services {
            padding: 7rem 5%;
            background: var(--deep);
            position: relative;
        }

        .services::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }

        .section-head {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-eyebrow {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            display: block;
            margin-bottom: 1rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 4.5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.2rem;
        }

        .section-desc {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            max-width: 1300px;
            margin: 0 auto;
            border: 1px solid var(--border);
        }

        .service-card {
            background: var(--deep);
            padding: 3rem 2.5rem;
            transition: background 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(to right, var(--gold), var(--gold-light));
            transition: width 0.5s ease;
        }

        .service-card:hover {
            background: var(--surface);
        }

        .service-card:hover::after { width: 100%; }

        .service-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            display: block;
        }

        .service-icon-wrap {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            color: var(--gold);
            font-size: 1.4rem;
            transition: border-color 0.3s ease;
        }

        .service-card:hover .service-icon-wrap {
            border-color: var(--gold);
        }

        .service-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.75;
        }

        /* ── PRODUCTS ── */
        .products {
            padding: 7rem 5%;
            background: var(--black);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            max-width: 1300px;
            margin: 0 auto;
            border: 1px solid var(--border);
        }

        .product-card {
            background: var(--black);
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .product-bg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            opacity: 0.06;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .product-card:hover .product-bg {
            opacity: 0.12;
            transform: scale(1.1);
        }

        .product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1.8rem;
            background: linear-gradient(to top, rgba(8,8,8,0.98) 0%, rgba(8,8,8,0.7) 60%, transparent 100%);
            transform: translateY(8px);
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-info { transform: translateY(0); }

        .product-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            transition: color 0.3s ease;
        }

        .product-card:hover h4 { color: var(--gold); }

        .product-card p {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .product-corner {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            width: 28px;
            height: 28px;
            border-top: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover .product-corner { opacity: 1; }

        /* ── ABOUT ── */
        .about {
            padding: 7rem 5%;
            background: var(--deep);
            position: relative;
        }

        .about::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }

        .about-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            align-items: center;
        }

        .about-content .section-eyebrow { text-align: left; }

        .about-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 1.5rem;
        }

        .about-content h2 em {
            font-style: italic;
            color: var(--gold);
        }

        .about-content p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.85;
            margin-bottom: 2rem;
        }

        .about-list {
            list-style: none;
            margin-bottom: 2.5rem;
        }

        .about-list li {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.92rem;
            color: var(--text);
        }

        .about-list li:first-child { border-top: 1px solid var(--border); }

        .about-list li::before {
            content: '◆';
            color: var(--gold);
            font-size: 0.5rem;
            flex-shrink: 0;
        }

        .about-visual {
            position: relative;
            height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-logo-large {
            width: 280px;
            height: 280px;
            object-fit: contain;
            filter: drop-shadow(0 0 60px rgba(201,169,98,0.2));
            animation: breathe 4s ease-in-out infinite;
        }

        /* Decorative corner frames */
        .corner-frame {
            position: absolute;
            width: 80px;
            height: 80px;
        }

        .corner-frame.tl { top: 0; left: 0; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
        .corner-frame.tr { top: 0; right: 0; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
        .corner-frame.bl { bottom: 0; left: 0; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
        .corner-frame.br { bottom: 0; right: 0; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

        /* ── CONTACT ── */
        .contact {
            padding: 7rem 5%;
            background: var(--black);
        }

        .contact-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 5rem;
        }

        .contact-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 1.2rem;
        }

        .contact-info h2 em { font-style: italic; color: var(--gold); }

        .contact-info > p {
            color: var(--text-muted);
            font-size: 0.98rem;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .contact-items {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .contact-item {
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
        }

        .contact-item-icon {
            width: 42px;
            height: 42px;
            border: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            color: var(--gold);
        }

        .contact-item-text label {
            display: block;
            font-size: 0.68rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
        }

        .contact-item-text p,
        .contact-item-text a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: color 0.3s ease;
        }

        .contact-item-text a:hover { color: var(--gold); }

        .contact-form {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-field {
            margin-bottom: 1.2rem;
        }

        .form-field label {
            display: block;
            font-size: 0.68rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .form-field input,
        .form-field textarea,
        .form-field select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--black);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
            appearance: none;
        }

        .form-field input:focus,
        .form-field textarea:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .form-field textarea { min-height: 120px; resize: vertical; }

        .form-submit {
            width: 100%;
            padding: 1.1rem;
            background: var(--gold);
            color: var(--black);
            border: 1px solid var(--gold);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .form-submit:hover {
            background: transparent;
            color: var(--gold);
        }

        /* ── FOOTER ── */
        footer {
            background: var(--deep);
            border-top: 1px solid var(--border);
            padding: 4rem 5% 2.5rem;
        }

        .footer-top {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            max-width: 1300px;
            margin: 0 auto 3.5rem;
            padding-bottom: 3.5rem;
            border-bottom: 1px solid var(--border);
        }

        .footer-brand {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .footer-brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-brand-logo img {
            height: 50px;
            width: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(201,169,98,0.2));
        }

        .footer-brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 800;
        }

        .footer-brand-name span { color: var(--gold); }

        .footer-brand p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.75;
            max-width: 300px;
        }

        .footer-brand-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.88rem;
            color: var(--gold);
            letter-spacing: 1px;
        }

        .footer-col h4 {
            font-size: 0.72rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .footer-col ul { list-style: none; }

        .footer-col ul li {
            margin-bottom: 0.75rem;
        }

        .footer-col ul li a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.3s ease;
        }

        .footer-col ul li a:hover { color: var(--gold); }

        .footer-bottom {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-bottom p {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .social-row {
            display: flex;
            gap: 0.75rem;
        }

        .social-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-2px);
        }

        /* ── ANIMATIONS ── */
        @keyframes heroLogoIn {
            from { opacity: 0; transform: scale(0.85); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        @keyframes breathe {
            0%, 100% { filter: drop-shadow(0 0 40px rgba(201,169,98,0.15)); }
            50% { filter: drop-shadow(0 0 70px rgba(201,169,98,0.35)); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            .products-grid { grid-template-columns: repeat(2, 1fr); }
            .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
            .about-visual { height: 300px; }
            .footer-top { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .services-grid { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: repeat(2, 1fr); }
            .footer-top { grid-template-columns: 1fr; gap: 2rem; }
            .contact-form { padding: 2rem; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
